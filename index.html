<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>艾咔·专业版 - 登录</title>
    <style>
      html,
      body,
      #app {
        width: 100%;
        min-height: 100%;
        margin: 0;
        background: #07122a;
      }

      .app-boot-loader {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        align-items: center;
        justify-content: center;
        background:
          radial-gradient(circle at 50% 42%, rgba(74, 142, 255, 0.18), transparent 34%),
          #07122a;
        color: #d9e2ff;
        font-family:
          Inter,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
      }

      .app-boot-loader__content {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 18px;
      }

      .app-boot-loader__ring {
        width: 52px;
        height: 52px;
        border-radius: 999px;
        border: 3px solid rgba(217, 226, 255, 0.16);
        border-top-color: #4a8eff;
        box-shadow: 0 0 22px rgba(74, 142, 255, 0.28);
        animation: appBootSpin 0.8s linear infinite;
      }

      .app-boot-loader__text {
        font-size: 13px;
        font-weight: 800;
        letter-spacing: 0;
        color: rgba(217, 226, 255, 0.82);
      }

      @keyframes appBootSpin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
    <link href="/googlefonts1.css" rel="stylesheet" />
    <link href="/googlefonts2.css" rel="stylesheet" />
    <script src="/tailwindcss.js"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              'on-secondary-container': '#abb9d6',
              'surface-dim': '#07122a',
              'on-background': '#d9e2ff',
              'primary-fixed': '#d8e2ff',
              'on-secondary': '#233148',
              'surface-container-high': '#1f2942',
              outline: '#8b90a0',
              'outline-variant': '#414754',
              'surface-bright': '#2f3952',
              primary: '#adc7ff',
              'on-surface-variant': '#c1c6d7',
              'on-tertiary-fixed': '#101c2c',
              'on-surface': '#d9e2ff',
              'inverse-surface': '#d9e2ff',
              'error-container': '#93000a',
              'on-primary-fixed-variant': '#004493',
              'inverse-primary': '#005bc0',
              'surface-container-highest': '#2a344e',
              secondary: '#b9c7e4',
              'inverse-on-surface': '#263049',
              'on-tertiary': '#253141',
              'on-primary': '#002e68',
              'on-tertiary-container': '#1e2a3a',
              'surface-tint': '#adc7ff',
              'surface-container-low': '#101b33',
              'secondary-fixed': '#d6e3ff',
              'surface-container': '#151f37',
              'tertiary-fixed': '#d7e3f9',
              'primary-fixed-dim': '#adc7ff',
              'on-error': '#690005',
              'on-tertiary-fixed-variant': '#3c4859',
              'tertiary-container': '#8591a5',
              background: '#07122a',
              'on-primary-fixed': '#001a41',
              'on-secondary-fixed': '#0d1c32',
              'primary-container': '#4a8eff',
              error: '#ffb4ab',
              'secondary-fixed-dim': '#b9c7e4',
              'secondary-container': '#3c4962',
              'on-primary-container': '#00285b',
              'surface-variant': '#2a344e',
              surface: '#07122a',
              tertiary: '#bbc7dc',
              'on-secondary-fixed-variant': '#39475f',
              'on-error-container': '#ffdad6',
              'tertiary-fixed-dim': '#bbc7dc',
              'surface-container-lowest': '#030d25',
              'electric-blue': '#4a8eff',
            },
            fontFamily: {
              'label-caps': ['Inter'],
              'header-section': ['Inter'],
              'code-data': ['JetBrains Mono'],
              'body-md': ['Inter'],
              display: ['Inter'],
            },
          },
        },
      };
    </script>
  </head>

  <body>
    <div id="app">
      <div class="app-boot-loader">
        <div class="app-boot-loader__content">
          <div class="app-boot-loader__ring"></div>
          <div class="app-boot-loader__text">AICut loading...</div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
