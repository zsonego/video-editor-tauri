name: Build macOS

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  build-macos:
    name: Build macOS app
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin,aarch64-apple-darwin

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build macOS .app and .dmg bundles
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: --target universal-apple-darwin --bundles app,dmg

      - name: Archive macOS .app bundle
        run: |
          APP_PATH="$(find src-tauri/target -type d -path '*/release/bundle/macos/*.app' | head -n 1)"
          if [ -z "$APP_PATH" ]; then
            echo "No .app bundle found"
            find src-tauri/target -path '*/bundle/*' -print
            exit 1
          fi
          ditto -c -k --sequesterRsrc --keepParent "$APP_PATH" macos-app.zip

      - name: Upload macOS app
        uses: actions/upload-artifact@v4
        with:
          name: macos-app-universal
          path: macos-app.zip
          if-no-files-found: error

      - name: Upload macOS dmg
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg-universal
          path: |
            src-tauri/target/release/bundle/dmg/*.dmg
            src-tauri/target/*/release/bundle/dmg/*.dmg
          if-no-files-found: error
